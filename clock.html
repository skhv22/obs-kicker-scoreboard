<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kicker Scoreboard – Clock</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="screens/clock/clock.css" />
</head>
<body class="clock-mode">
  <div class="clock-wrap">
    <div class="clock-display" aria-live="polite">
      <span class="clock-time" id="clockTime">13:00</span>
      <span class="clock-date" id="clockDate">01.01.2026</span>
    </div>
  </div>

  <script type="module" src="clock.js"></script>
</body>
</html>
